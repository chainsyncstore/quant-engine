
version: '3.8'

services:
  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: quant_redis
    restart: unless-stopped
    read_only: true
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    pids_limit: 128
    cpus: 0.50
    mem_limit: 512m
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m,uid=999,gid=999
      - /data:rw,noexec,nosuid,size=64m
    expose:
      - "6379"
    environment:
      - REDIS_ACL_USERNAME=${REDIS_ACL_USERNAME:-quant_app}
    secrets:
      - source: redis_password
        target: redis_password
        uid: "999"
        gid: "999"
        mode: 0440
    command:
      - /bin/sh
      - -ec
      - |
        umask 077
        password="$$(cat /run/secrets/redis_password)"
        username="$${REDIS_ACL_USERNAME}"
        case "$$password" in ''|*[!A-Za-z0-9_-]*) echo 'Invalid Redis password format' >&2; exit 1;; esac
        case "$$username" in ''|*[!A-Za-z0-9_-]*) echo 'Invalid Redis ACL username format' >&2; exit 1;; esac
        printf 'user default off\nuser %s on >%s ~stream:* ~wal:* &cmd:* &evt:* +ping +publish +subscribe +unsubscribe +psubscribe +punsubscribe +xadd +xgroup +xreadgroup +xpending +xrange +xack +xtrim\n' "$$username" "$$password" > /tmp/users.acl
        unset password username
        exec redis-server --appendonly no --dir /data --aclfile /tmp/users.acl
    healthcheck:
      test:
        - CMD-SHELL
        - REDISCLI_AUTH="$$(cat /run/secrets/redis_password)" redis-cli --user "$${REDIS_ACL_USERNAME}" ping | grep -q '^PONG$$'
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"

  telegram_bot:
    image: ${QUANT_IMAGE:?Set QUANT_IMAGE to registry/repository@sha256 digest}
    container_name: quant_telegram
    restart: unless-stopped
    user: "10001:10001"
    read_only: true
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    pids_limit: 256
    cpus: 1.00
    mem_limit: 2g
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m,uid=10001,gid=10001
      - /home/quantbot/.cache:rw,noexec,nosuid,size=512m,uid=10001,gid=10001
    command: python -m quant.telebot.main
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models
      - ./quant:/app/quant:ro
      - ./quant_v2:/app/quant_v2:ro
      - ./state:/state
      - ./signal_log.json:/app/signal_log.json
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    environment:
      - BOT_DB_PATH=/state/quant_bot.db
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - ADMIN_ID=${ADMIN_ID}
      - BOT_MASTER_KEY=${BOT_MASTER_KEY}
      - BOT_EXECUTION_BACKEND=${BOT_EXECUTION_BACKEND:-v2}
      - BOT_V2_ALLOW_LIVE_EXECUTION=${BOT_V2_ALLOW_LIVE_EXECUTION:-0}
      - BOT_V2_ENFORCE_GO_NO_GO=${BOT_V2_ENFORCE_GO_NO_GO:-true}
      - BOT_V2_LIVE_GO_NO_GO=${BOT_V2_LIVE_GO_NO_GO:-true}
      - BOT_V2_FORCE_ROLLBACK=${BOT_V2_FORCE_ROLLBACK:-}
      # --- signal-loop tuning knobs (audit_20260423) ---
      - BOT_V2_SIGNAL_LOOP_SECONDS=${BOT_V2_SIGNAL_LOOP_SECONDS:-900}
      - BOT_V2_MAX_HOLD_HOURS=${BOT_V2_MAX_HOLD_HOURS:-12}
      - BOT_V2_QUIET_HEARTBEAT=${BOT_V2_QUIET_HEARTBEAT:-0}
      # --- P0-4 stranded-position flatten (mirrors optimizer floor) ---
      - BOT_V2_MIN_NOTIONAL_USD=${BOT_V2_MIN_NOTIONAL_USD:-10}
      - BOT_V2_MIN_NOTIONAL_EQUITY_PCT=${BOT_V2_MIN_NOTIONAL_EQUITY_PCT:-0.005}
      - BOT_V2_STRANDED_FLATTEN_CYCLES=${BOT_V2_STRANDED_FLATTEN_CYCLES:-4}
      - BOT_MODEL_ROOT=/app/models/production
      - BOT_MODEL_REGISTRY_ROOT=/app/models/production/registry
      - CRYPTOCOMPARE_API_KEY=${CRYPTOCOMPARE_API_KEY:-}
      - BOT_ENABLE_CHRONOS=${BOT_ENABLE_CHRONOS:-0}

  retrain_scheduler:
    image: ${QUANT_IMAGE:?Set QUANT_IMAGE to registry/repository@sha256 digest}
    container_name: quant_retrain
    restart: unless-stopped
    user: "10001:10001"
    read_only: true
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    pids_limit: 512
    cpus: 1.50
    mem_limit: 3g
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=256m,uid=10001,gid=10001
      - /home/quantbot/.cache:rw,noexec,nosuid,size=1g,uid=10001,gid=10001
    command: python -m quant_v2.research.scheduled_retrain
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./models:/app/models
      - ./quant:/app/quant:ro
      - ./quant_v2:/app/quant_v2:ro
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    environment:
      - BOT_MODEL_ROOT=/app/models/production
      - BOT_MODEL_REGISTRY_ROOT=/app/models/production/registry
      - RETRAIN_INTERVAL_HOURS=${RETRAIN_INTERVAL_HOURS:-168}
      - RETRAIN_TRAIN_MONTHS=${RETRAIN_TRAIN_MONTHS:-6}
      - RETRAIN_MIN_ACCURACY=${RETRAIN_MIN_ACCURACY:-0.50}
      - RETRAIN_STARTUP_DELAY_SECONDS=${RETRAIN_STARTUP_DELAY_SECONDS:-90}

  model_evaluator:
    image: ${QUANT_IMAGE:?Set QUANT_IMAGE to registry/repository@sha256 digest}
    container_name: quant_model_eval
    restart: unless-stopped
    user: "10001:10001"
    read_only: true
    security_opt: ["no-new-privileges:true"]
    cap_drop: ["ALL"]
    pids_limit: 256
    cpus: 1.00
    mem_limit: 2g
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=128m,uid=10001,gid=10001
      - /home/quantbot/.cache:rw,noexec,nosuid,size=512m,uid=10001,gid=10001
    command: python -m quant_v2.research.model_evaluator
    depends_on:
      redis:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    volumes:
      - ./models:/app/models
      - ./state:/state
      - ./quant:/app/quant:ro
      - ./quant_v2:/app/quant_v2:ro
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    environment:
      - BOT_DB_PATH=/state/quant_bot.db
      - BOT_MODEL_ROOT=/app/models/production
      - BOT_MODEL_REGISTRY_ROOT=/app/models/production/registry
      - BOT_ENABLE_CHRONOS=${BOT_ENABLE_CHRONOS:-0}
      - MODEL_EVAL_INTERVAL_SECONDS=${MODEL_EVAL_INTERVAL_SECONDS:-900}
      - MODEL_EVAL_STARTUP_DELAY_SECONDS=${MODEL_EVAL_STARTUP_DELAY_SECONDS:-180}
      - MODEL_EVAL_THRESHOLD_TUNING_HOURS=${MODEL_EVAL_THRESHOLD_TUNING_HOURS:-72}
      - MODEL_EVAL_PROMOTION_WINDOW_HOURS=${MODEL_EVAL_PROMOTION_WINDOW_HOURS:-168}
      - MODEL_EVAL_AUTO_PROMOTE=${MODEL_EVAL_AUTO_PROMOTE:-0}
      - MODEL_EVAL_MIN_RESOLVED_DECISIONS=${MODEL_EVAL_MIN_RESOLVED_DECISIONS:-500}
      - MODEL_EVAL_MIN_ACTIONABLE_DECISIONS=${MODEL_EVAL_MIN_ACTIONABLE_DECISIONS:-30}
      - MODEL_EVAL_MIN_EDGE_BPS=${MODEL_EVAL_MIN_EDGE_BPS:-25}

secrets:
  redis_password:
    file: ${REDIS_PASSWORD_FILE:?Set REDIS_PASSWORD_FILE to an operator-managed secret file}
