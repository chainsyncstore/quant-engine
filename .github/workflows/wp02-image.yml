name: WP-02 exact image

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test-scan:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: 3.11.9
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Verify dependency locks
        run: |
          python -m pip install --require-hashes --no-deps -r requirements/build.lock
          uv pip compile requirements/build.in --output-file requirements/build.lock --python-version 3.11 --python-platform x86_64-manylinux_2_28 --generate-hashes
          uv pip compile requirements/runtime.in --output-file requirements/runtime.lock --python-version 3.11 --python-platform x86_64-manylinux_2_28 --torch-backend cpu --generate-hashes
          uv pip compile requirements/test.in --output-file requirements/test.lock --python-version 3.11 --python-platform x86_64-manylinux_2_28 --generate-hashes
          git diff --exit-code -- requirements/build.lock requirements/runtime.lock requirements/test.lock

      - name: Generate clean release manifest
        run: |
          python tools/build_manifest.py --release --output .build/wp02-manifest.json
          mkdir -p evidence
          python tools/verify_external_artifacts.py --output evidence/external-images.json

      - name: Build release once (full suite and Ruff are required stages)
        env:
          SOURCE_DATE_EPOCH: "0"
        run: |
          META=.build/wp02-manifest.json
          docker buildx build --load --target release --tag quant-bot:wp02 \
            --build-arg VCS_REF="$(jq -r .git_sha "$META")" \
            --build-arg SOURCE_MANIFEST_SHA256="$(jq -r .source_manifest_sha256 "$META")" \
            --build-arg LOCK_SHA256="$(jq -r .lock_sha256 "$META")" \
            --build-arg BUILD_DATE="1970-01-01T00:00:00Z" \
            --build-arg CI_RUN_ID="${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" .

      - name: Smoke the exact built image
        run: |
          mkdir -p evidence
          docker run --rm --read-only --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --cap-drop ALL --security-opt no-new-privileges:true quant-bot:wp02 \
            python /app/tools/image_smoke.py --require-release-marker | tee evidence/smoke.json
          docker run --rm --read-only --tmpfs /tmp:rw,noexec,nosuid,size=16m \
            --cap-drop ALL --security-opt no-new-privileges:true quant-bot:wp02 \
            sh -ec 'test "$(id -u)" = 10001; test -f /app/.wp02-tests-passed; \
              test ! -d /app/tests; test ! -d /opt/build-tools; \
              test ! -e /app/requirements/build.lock; test ! -e /build/requirements/build.lock; \
              ! command -v uv; ! command -v pytest; ! command -v ruff; \
              echo "uid=10001 marker=present uv=absent pytest=absent ruff=absent tests=absent build_lock=absent"' \
            | tee evidence/runtime-exclusions.txt
          docker image inspect quant-bot:wp02 > evidence/image-inspect.json

      - name: Install pinned scanners with release checksums
        run: |
          SYFT_VERSION=1.42.2
          TRIVY_VERSION=0.71.2
          SYFT_SHA256=1d3cc98b13ce3dfb6083ef42f64f1033e40d7dea292e8ea85ed1cf88efb2f542
          TRIVY_SHA256=0510e71e2fd39bf863856d499c8dc19feb4e7336546394c502a8f5cc7ab27460
          curl -fsSLO "https://github.com/anchore/syft/releases/download/v${SYFT_VERSION}/syft_${SYFT_VERSION}_linux_amd64.tar.gz"
          echo "${SYFT_SHA256}  syft_${SYFT_VERSION}_linux_amd64.tar.gz" | sha256sum -c -
          tar -xzf "syft_${SYFT_VERSION}_linux_amd64.tar.gz" syft
          sudo install syft /usr/local/bin/syft
          curl -fsSLO "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz"
          echo "${TRIVY_SHA256}  trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" | sha256sum -c -
          tar -xzf "trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" trivy
          sudo install trivy /usr/local/bin/trivy

      - name: Generate SBOM and security evidence
        run: |
          syft quant-bot:wp02 -o cyclonedx-json=evidence/sbom.cdx.json
          trivy image --scanners vuln --severity HIGH,CRITICAL --exit-code 1 \
            --format json --output evidence/vulnerabilities.json quant-bot:wp02
          trivy fs --scanners secret --exit-code 1 --format json \
            --output evidence/secrets.json .
          IMAGE_ID="$(docker image inspect quant-bot:wp02 --format '{{.Id}}')"
          python tools/image_attestation.py --image-id "$IMAGE_ID" \
            --manifest .build/wp02-manifest.json \
            --evidence evidence/smoke.json evidence/runtime-exclusions.txt \
              evidence/image-inspect.json evidence/external-images.json \
              evidence/sbom.cdx.json evidence/vulnerabilities.json evidence/secrets.json \
            --output evidence/attestation.json
          cp .build/wp02-manifest.json evidence/build-manifest.json

      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        if: always()
        with:
          name: wp02-image-evidence-${{ github.sha }}
          path: evidence/
          if-no-files-found: error
          retention-days: 30
