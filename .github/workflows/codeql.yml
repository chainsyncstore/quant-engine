name: CodeQL

on:
  pull_request:
  push:
    branches:
      - main
  schedule:
    - cron: "17 3 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@3cfe1ba7a5dc261d28f8b0afc11a34cce5f53374
        with:
          languages: python

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@3cfe1ba7a5dc261d28f8b0afc11a34cce5f53374
