name: Production Readiness

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: production-readiness-${{ github.ref }}
  cancel-in-progress: false

jobs:
  readiness:
    name: Production readiness gates
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      BOT_V2_ALLOW_LIVE_EXECUTION: "0"

    steps:
      - name: Check out repository
        # actions/checkout v4
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false

      - name: Set up Python
        # actions/setup-python v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.11"
          cache: pip

      - name: Install pinned CI tools
        run: python -m pip install --require-hashes -r requirements-ci.lock

      - name: Install locked runtime dependencies
        run: python -m pip install --require-hashes -r requirements.lock

      - name: Run production readiness wrapper
        run: python tools/security/production_readiness.py --profile ci

      - name: Upload SBOM
        # actions/upload-artifact v4
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        if: always()
        with:
          name: production-sbom
          path: build/security/sbom.cdx.json
          if-no-files-found: error
