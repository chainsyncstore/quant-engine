services:
  telegram_bot:
    environment:
      - RETRAIN_ENABLED=0
      - BOT_V2_MARKET_SHORT_GUARD_LOOKBACK_HOURS=30
      - BOT_V2_MARKET_SHORT_GUARD_DOWN_RATIO=0.70
      - BOT_V2_MARKET_SHORT_GUARD_MEDIAN_RETURN=-0.015
      - BOT_V2_MARKET_SHORT_GUARD_BTC_RETURN=-0.020
      - BOT_V2_MARKET_SHORT_GUARD_STRONG_CONFIDENCE=0.75
      - BOT_V2_MARKET_SHORT_GUARD_NET_CAP_FRAC=0.15
      - BOT_V2_REGIME2_BUY_THRESHOLD=0.57
      - BOT_V2_REGIME2_SELL_THRESHOLD=0.35
      - BOT_V2_REGIME2_SELL_ALLOCATION_MULT=0.50
      - BOT_V2_REQUIRE_CHRONOS_AGREEMENT_FOR_ENTRY=1
      - BOT_V2_CHRONOS_DISAGREEMENT_MULT=0.25
      - BOT_V2_CHRONOS_EXTREME_CONFIDENCE=0.80
    dns:
      - 1.1.1.1
      - 8.8.8.8
  retrain_scheduler:
    cpus: 1.5
    mem_limit: 3g
    environment:
      - BOT_RETRAIN_AUTO_PROMOTE=0
      - RETRAIN_MIN_ACCURACY=0.60
      - RETRAIN_REQUIRE_ALL_SYMBOLS=1
      - RETRAIN_REQUIRE_ALL_HORIZONS=1
      - RETRAIN_STARTUP_DELAY_SECONDS=3600
    dns:
      - 1.1.1.1
      - 8.8.8.8
